<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>حجز استشارة | د. سعد صبري الزبيدي</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #004a99; --accent: #25d366; --text: #2c3e50; --border: rgba(255,255,255,0.3); }
        
        body { font-family: 'Tajawal', -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #f2f6f9 0%, #e8f0f6 100%); margin: 0; color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; -webkit-font-smoothing: antialiased; padding: 20px; box-sizing: border-box; overflow: hidden; /* For initial loading animation */}
        
        /* Glassmorphism Container */
        .booking-container { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); max-width: 500px; width: 100%; border-radius: 28px; box-shadow: 0 15px 50px rgba(0,74,153,0.1); padding: 45px 35px; border: 1px solid var(--border); overflow: hidden; transform: translateY(100px); opacity: 0; animation: fadeSlideUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        
        @keyframes fadeSlideUp { to { transform: translateY(0); opacity: 1; } }
        
        /* Animated Avatar Section */
        .logo-section { text-align: center; margin-bottom: 35px; position: relative; }
        .avatar-glow { width: 110px; height: 110px; border-radius: 50%; background: var(--primary); display: inline-flex; justify-content: center; align-items: center; box-shadow: 0 0 30px rgba(0,74,153,0.3); position: relative; z-index: 10; animation: pulseGlow 2s infinite; }
        .avatar-glow img { width: 90%; height: 90%; border-radius: 50%; object-fit: cover; border: 3px solid rgba(255,255,255,0.7); }
        .avatar-bg-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 130px; height: 130px; border-radius: 50%; background: rgba(0,74,153,0.05); animation: pulseExpand 2.5s infinite; z-index: 1; }
        
        @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 30px rgba(0,74,153,0.3); } 50% { box-shadow: 0 0 50px rgba(0,74,153,0.5); } }
        @keyframes pulseExpand { 0% { width: 130px; height: 130px; opacity: 1; } 100% { width: 180px; height: 180px; opacity: 0; } }

        /* Welcome Message & Headers */
        h1 { margin: 15px 0 5px 0; font-size: 26px; color: var(--primary); font-weight: 800; }
        p.welcome-text { margin: 0 0 20px 0; font-size: 16px; color: #555; font-weight: 700; opacity: 0.8; }
        p.subtitle { display: inline-block; background: var(--primary); color: white; padding: 6px 15px; border-radius: 20px; font-size: 13px; font-weight: bold; margin-bottom: 25px; box-shadow: 0 3px 6px rgba(0,74,153,0.2); text-transform: uppercase; letter-spacing: 0.5px; }

        /* Forms & Interactive Cascading Animation */
        .input-group { margin-bottom: 22px; text-align: right; opacity: 0; animation: fadeIn 0.5s ease forwards; }
        label { display: block; font-size: 14px; font-weight: bold; color: #555; margin-bottom: 9px; }
        input, textarea { width: 100%; padding: 16px; border: 1px solid rgba(0,74,153,0.15); border-radius: 14px; font-size: 15px; background: rgba(255,255,255,0.6); box-sizing: border-box; transition: 0.3s; font-family: inherit; }
        input:focus, textarea:focus { border-color: var(--primary); background: #fff; outline: none; box-shadow: 0 0 0 4px rgba(0, 74, 153, 0.1); }
        textarea { resize: none; min-height: 100px; }

        @keyframes fadeIn { to { opacity: 1; } }

        /* MCQ Chips Cascading */
        .mcq-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; opacity: 0; animation: fadeIn 0.5s ease forwards; }
        .mcq-chip { background: rgba(0,74,153,0.05); border: 2px solid transparent; padding: 14px; text-align: center; border-radius: 14px; font-weight: bold; font-size: 15px; color: #555; cursor: pointer; transition: 0.2s; user-select: none; }
        .mcq-chip:hover { background: rgba(0,74,153,0.1); transform: translateY(-1px); }
        .mcq-chip.active { background: #eef4fb; border-color: var(--primary); color: var(--primary); box-shadow: 0 4px 10px rgba(0, 74, 153, 0.15); }

        /* Staggered Delay for Form Groups */
        .input-group:nth-of-type(1) { animation-delay: 0.9s; }
        .input-group:nth-of-type(2) { animation-delay: 1.1s; }
        .input-group:nth-of-type(3) { animation-delay: 1.3s; }
        .input-group:nth-of-type(4) { animation-delay: 1.5s; }
        .submit-btn-group { animation-delay: 1.7s; }

        /* The Ultimate Submit Button */
        .submit-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 19px; border-radius: 14px; font-size: 18px; font-weight: bold; cursor: pointer; transition: transform 0.1s, box-shadow 0.2s; margin-top: 15px; box-shadow: 0 4px 15px rgba(0, 74, 153, 0.3); font-family: inherit; }
        .submit-btn:hover { box-shadow: 0 6px 20px rgba(0, 74, 153, 0.4); transform: translateY(-1px); }
        .submit-btn:active { transform: scale(0.98); box-shadow: 0 2px 5px rgba(0,74,153,0.2); }
        .submit-btn:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }

        /* Success Screen Glassmorphism */
        #successScreen { display: none; text-align: center; padding: 50px 0; animation: fadeInSuccess 0.5s ease; }
        @keyframes fadeInSuccess { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .check-icon { font-size: 50px; color: #28a745; margin-bottom: 25px; }
    </style>
</head>
<body>

<div class="booking-container">
    <div id="bookingForm">
        <div class="logo-section">
            <div class="avatar-glow">
                <img src="logo.jpg" alt="Dr. Saad Sabry" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3304/3304567.png'">
            </div>
            <div class="avatar-bg-circle"></div>
            <h1>د. سعد صبري الزبيدي</h1>
            <p class="welcome-text">أهلاً بكم.. صحتكم أولويتنا</p>
            <p class="subtitle">حجز استشارة جراحية أونلاين</p>
        </div>

        <div class="input-group">
            <label>الاسم الكامل</label>
            <input type="text" id="ptName" placeholder="الرجاء كتابة اسمك الثلاثي" required>
        </div>

        <div class="input-group">
            <label>رقم الهاتف (واتساب)</label>
            <input type="tel" id="ptPhone" placeholder="07XX XXX XXXX" required dir="ltr" style="text-align: right;">
        </div>

        <div class="input-group">
            <label>أعراضك أو التشخيص المرضي</label>
            <textarea id="ptSymptom" placeholder="اكتب باختصار عن حالتك، ما تشعر به، أو التشخيص المبدئي..." required></textarea>
        </div>

        <div class="input-group">
            <label>منذ متى تشعر بالأعراض؟</label>
            <div class="mcq-grid" id="durationGrid">
                <div class="mcq-chip" onclick="selectDuration(this, 'شهر و اكثر')">شهر و اكثر</div>
                <div class="mcq-chip" onclick="selectDuration(this, '٣ أشهر و اكثر')">٣ أشهر و اكثر</div>
                <div class="mcq-chip" onclick="selectDuration(this, '٦ أشهر و اكثر')">٦ أشهر و اكثر</div>
                <div class="mcq-chip" onclick="selectDuration(this, 'سنة و اكثر')">سنة و اكثر</div>
            </div>
            <input type="hidden" id="ptDuration" value="">
        </div>

        <div class="input-group submit-btn-group">
            <button class="submit-btn" id="submitBtn" onclick="submitRequest()">إرسال طلب الحجز 🔐</button>
        </div>
    </div>

    <div id="successScreen">
        <div class="check-icon">✓</div>
        <h2 style="color: #2c3e50; margin-bottom: 12px;">تم استلام طلبك بأمان</h2>
        <p style="color: #666; line-height: 1.6; font-size: 16px;">شكراً لثقتك.. ستقوم السكرتارية بالتواصل معك قريباً عبر الواتساب لتأكيد موعدك النهائي.</p>
    </div>
</div>

<script>
    // EXACT SAME CONFIG AS YOUR MASTER APP
    const firebaseConfig = {
        apiKey: "AIzaSyBmQlAnDbaVeZOz1lZbRsH-NyJ7TgTfBPU",
        authDomain: "saad-clinic.firebaseapp.com",
        databaseURL: "https://saad-clinic-default-rtdb.firebaseio.com",
        projectId: "saad-clinic",
        storageBucket: "saad-clinic.firebasestorage.app",
        messagingSenderId: "216860298716",
        appId: "1:216860298716:web:6f2e31e3267f8d1487d319",
        measurementId: "G-3DBY6CC5HD"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function selectDuration(element, value) {
        document.querySelectorAll('.mcq-chip').forEach(chip => chip.classList.remove('active'));
        element.classList.add('active');
        document.getElementById('ptDuration').value = value;
    }

    function submitRequest() {
        const name = document.getElementById('ptName').value.trim();
        const phone = document.getElementById('ptPhone').value.trim();
        const symptom = document.getElementById('ptSymptom').value.trim();
        const duration = document.getElementById('ptDuration').value;

        if (!name || !phone || !symptom || !duration) {
            alert("يرجى ملء جميع الحقول المطلوبة واختيار مدة الأعراض قبل الإرسال.");
            return;
        }

        const btn = document.getElementById('submitBtn');
        btn.innerText = "جاري التأمين والإرسال...";
        btn.disabled = true;

        // SEND TO THE ISOLATED "WAITING ROOM" IN FIREBASE
        const requestData = {
            name: name,
            phone: phone,
            symptom: symptom,
            duration: duration,
            timestamp: new Date().toISOString(),
            status: "pending"
        };

        db.ref('pendingBookings').push(requestData)
            .then(() => {
                document.getElementById('bookingForm').style.display = 'none';
                document.getElementById('successScreen').style.display = 'block';
            })
            .catch((error) => {
                alert("حدث خطأ في الشبكة. يرجى المحاولة مرة أخرى.");
                btn.innerText = "إرسال طلب الحجز 🔐";
                btn.disabled = false;
            });
    }
</script>
</body>
</html>
